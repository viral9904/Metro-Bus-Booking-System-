<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Routes — BM Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">🛠 BM Admin</a>
        <ul class="navbar-links">
            <li><a th:href="@{/admin/stops}">Stops</a></li>
            <li><a th:href="@{/admin/routes}" class="active">Routes</a></li>
            <li><a th:href="@{/admin/vehicles}">Vehicles</a></li>
            <li><a th:href="@{/admin/schedules}">Schedules</a></li>
            <li><a th:href="@{/admin/seat-classes}">Seat Classes</a></li>
            <li><a th:href="@{/logout}" class="btn-logout">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2 class="card-title">Add New Route</h2>

            <form th:action="@{/admin/routes/save}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>Source Stop</label>
                        <select name="sourceStop" class="form-control" required>
                            <option value="">Select Source</option>
                            <option th:each="s : ${stops}" th:value="${s.id}" th:text="${s.city + ' - ' + s.stopName}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Destination Stop</label>
                        <select name="destinationStop" class="form-control" required>
                            <option value="">Select Destination</option>
                            <option th:each="s : ${stops}" th:value="${s.id}" th:text="${s.city + ' - ' + s.stopName}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Distance (KM)</label>
                        <input type="number" step="0.1" name="distanceKm" class="form-control" placeholder="Distance"
                            required />
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add Route</button>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title">All Routes</h2>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Source</th>
                            <th>Destination</th>
                            <th>Distance (KM)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${routes}">
                            <td th:text="${r.id}"></td>
                            <td th:text="${r.sourceStop.city + ' - ' + r.sourceStop.stopName}"></td>
                            <td th:text="${r.destinationStop.city + ' - ' + r.destinationStop.stopName}"></td>
                            <td th:text="${r.distanceKm}"></td>
                            <td>
                                <a th:href="@{/admin/routes/delete/{id}(id=${r.id})}" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Delete this route?')">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>

</html>
