<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seat Class Form — BM Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">
        <span class="brand-icon">🛠</span>
        BM Admin
    </a>
    <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <ul class="navbar-links">
        <li><a th:href="@{/admin/seat-classes}"><span class="nav-icon">💺</span> Seat Classes</a></li>
    </ul>
</nav>

<div class="container">
    <div class="card">

        <h2 class="card-title"
            th:text="${seatClass.id != null} ? '✏️ Edit Seat Class' : '➕ Add Seat Class'">
        </h2>

        <!-- Success Message -->
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/admin/seat-classes/save}"
              th:object="${seatClass}"
              method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="form-row">

                <div class="form-group">
                    <label>Class Name</label>
                    <input type="text"
                           th:field="*{className}"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Base Fare (₹)</label>
                    <input type="number"
                           step="0.1"
                           th:field="*{baseFare}"
                           class="form-control"
                           required>
                </div>

                <div class="form-group">
                    <label>Rate Per KM (₹)</label>
                    <input type="number"
                           step="0.1"
                           th:field="*{ratePerKm}"
                           class="form-control"
                           required>
                </div>

            </div>

            <div style="display:flex; gap:12px;">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${seatClass.id != null} ? '✅ Update' : '💾 Save'"></span>
                </button>

                <a th:href="@{/admin/seat-classes}"
                   class="btn btn-outline">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
