<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Seat Classes — BM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">🛠 BM Admin</a>
    <ul class="navbar-links">
      <li><a th:href="@{/admin/stops}">Stops</a></li>
      <li><a th:href="@{/admin/routes}">Routes</a></li>
      <li><a th:href="@{/admin/vehicles}">Vehicles</a></li>
      <li><a th:href="@{/admin/schedules}">Schedules</a></li>
      <li><a th:href="@{/admin/seat-classes}" class="active">Seat Classes</a></li>
      <li><a th:href="@{/logout}" class="btn-logout">Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="card">
      <h2 class="card-title">Add New Seat Class</h2>

      <form th:action="@{/admin/seat-classes/save}" th:object="${seatClass}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label>Class Name</label>
            <input type="text" th:field="*{className}" class="form-control" placeholder="e.g. Sleeper, AC" required />
          </div>
          <div class="form-group">
            <label>Base Fare (₹)</label>
            <input type="number" step="0.1" th:field="*{baseFare}" class="form-control" placeholder="e.g. 250"
              required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Seat Class</button>
      </form>
    </div>

    <div class="card">
      <h2 class="card-title">All Seat Classes</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Class Name</th>
              <th>Base Fare (₹)</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c : ${seatClasses}">
              <td th:text="${c.id}"></td>
              <td th:text="${c.className}"></td>
              <td>₹<span th:text="${c.baseFare}"></span></td>
              <td>
                <a th:href="@{/admin/seat-classes/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm"
                  onclick="return confirm('Delete this seat class?')">Delete</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</body>

</html>
