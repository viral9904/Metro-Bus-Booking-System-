<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Seat Classes — BM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

<!-- ================= NAVIGATION ================= -->
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/admin/dashboard}">
      <span class="brand-icon">🛠</span>
      BM Admin
  </a>
  <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
  </button>
  <ul class="navbar-links">
    <li><a th:href="@{/admin/stops}"><span class="nav-icon">📍</span> Stops</a></li>
    <li><a th:href="@{/admin/routes}"><span class="nav-icon">🗺️</span> Routes</a></li>
    <li><a th:href="@{/admin/vehicles}"><span class="nav-icon">🚌</span> Vehicles</a></li>
    <li><a th:href="@{/admin/schedules}"><span class="nav-icon">📅</span> Schedules</a></li>
    <li><a th:href="@{/admin/seat-classes}" class="active"><span class="nav-icon">💺</span> Seat Classes</a></li>
    <!-- 👤 PROFILE DROPDOWN -->
    <li class="profile-dropdown" th:if="${loggedInUserName != null}">
      <a th:href="@{/profile}" class="profile-btn" id="profileBtn">
        <div class="avatar">👤</div>
        <span>Hi, <b th:text="${loggedInUserName}"></b></span>
      </a>
      <div id="dropdownMenu" class="dropdown-menu">
        <a th:href="@{/profile}">✏️ Edit Profile</a>
        <a th:href="@{/logout}">🚪 Logout</a>
      </div>
    </li>
  </ul>
</nav>

<div class="container">

  <!-- FLASH MESSAGES -->
  <div th:if="${success}" class="alert alert-success">
    <span th:text="${success}"></span>
  </div>

  <div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
  </div>

  <!-- ADD BUTTON -->
  <a th:href="@{/admin/seat-classes/add}"
     class="btn btn-primary mb-2">
    ➕ Add Seat Class
  </a>

  <!-- ================= ALL SEAT CLASSES ================= -->
  <div class="card">
    <h2 class="card-title">💺 All Seat Classes</h2>

    <div class="table-wrapper">
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Class Name</th>
          <th>Base Fare (₹)</th>
          <th>Rate/KM (₹)</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="seatClass : ${seatClasses}">

          <td th:text="${seatClass.id}"></td>
          <td th:text="${seatClass.className}"></td>
          <td><strong>₹<span th:text="${seatClass.baseFare}"></span></strong></td>
          <td>₹<span th:text="${seatClass.ratePerKm}"></span></td>

          <td>
            <span th:if="${seatClass.active}"
                  class="badge badge-confirmed">
              Active
            </span>
            <span th:if="${!seatClass.active}"
                  class="badge badge-cancelled">
              Inactive
            </span>
          </td>

          <td>

            <!-- EDIT -->
            <a th:href="@{/admin/seat-classes/edit/{id}(id=${seatClass.id})}"
               class="btn btn-warning btn-sm">
              ✏️ Edit
            </a>

            <!-- DELETE -->
            <a th:if="${seatClass.active}"
               th:href="@{/admin/seat-classes/delete/{id}(id=${seatClass.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Delete this seat class?')">
              🗑 Delete
            </a>

            <!-- RESTORE -->
            <a th:if="${!seatClass.active}"
               th:href="@{/admin/seat-classes/restore/{id}(id=${seatClass.id})}"
               class="btn btn-success btn-sm"
               onclick="return confirm('Restore this seat class?')">
              ♻️ Restore
            </a>

          </td>

        </tr>
        </tbody>

      </table>
    </div>
  </div>

</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
