<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile — BM Booking</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/user/dashboard}">
      <span class="brand-icon">🚌</span>
      BM Booking
  </a>
</nav>

<div class="container-narrow" style="min-height:auto; margin-top:40px;">
  <div class="card">
    <h2 class="card-title" style="justify-content:center; border:none;">✏️ Edit Profile</h2>

    <form th:action="@{/user/update-profile}" method="post" th:object="${user}">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" th:field="*{fullName}" required />
        </div>

        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" class="form-control" th:field="*{email}" readonly />
        </div>

        <div class="form-group">
            <label>📱 Phone</label>
            <input type="text" class="form-control" th:field="*{phone}" />
        </div>

        <button type="submit" class="btn btn-primary btn-block">Update</button>
    </form>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
