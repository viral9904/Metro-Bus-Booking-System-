<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Ticket — BM Booking</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/user/dashboard}">
      <span class="brand-icon">🚌</span>
      BM Booking
  </a>
  <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
  </button>
  <ul class="navbar-links">
    <li><a th:href="@{/user/search}"><span class="nav-icon">🔍</span> Search Routes</a></li>
    <li><a th:href="@{/user/my-bookings}"><span class="nav-icon">🎫</span> My Bookings</a></li>
    <!-- 👤 PROFILE DROPDOWN -->
    <li class="profile-dropdown" th:if="${loggedInUserName != null}">

      <a th:href="@{/profile}" class="profile-btn" id="profileBtn">
        <div class="avatar">👤</div>
        <span>Hi, <b th:text="${loggedInUserName}"></b></span>
      </a>

      <div id="dropdownMenu" class="dropdown-menu">
        <a th:href="@{/profile}">✏️ Edit Profile</a>
        <a th:href="@{/logout}">🚪 Logout</a>
      </div>

    </li>
  </ul>
</nav>

<div class="container">
  <div class="card">
    <h2 class="card-title">🎫 Book Ticket</h2>

    <!-- Route Info -->
    <div class="route-info">
      <span th:text="${booking.schedule.route.sourceStop.city
              + ' - ' + booking.schedule.route.sourceStop.stopName}"></span>
      <span class="arrow">→</span>
      <span th:text="${booking.schedule.route.destinationStop.city
              + ' - ' + booking.schedule.route.destinationStop.stopName}"></span>
    </div>

    <form th:action="@{/user/book}" method="post">

      <!-- Booking ID -->
      <input type="hidden" name="bookingId" th:value="${booking.id}" />

      <!-- ================= Passenger Details ================= -->
      <h3 class="mb-2" style="font-weight:700;">👥 Passenger Details</h3>

      <div th:each="i : ${#numbers.sequence(1, seatCount)}"
           class="passenger-block">

        <div class="passenger-header">
          Passenger <span th:text="${i}"></span>
        </div>

        <div class="form-row">

          <div class="form-group">
            <label>Name</label>
            <input type="text"
                   class="form-control"
                   name="passengerName"
                   placeholder="Full Name"
                   required />
          </div>

          <div class="form-group">
            <label>Age</label>
            <input type="number"
                   class="form-control"
                   name="age"
                   min="1"
                   required />
          </div>

          <div class="form-group">
            <label>Gender</label>
            <select class="form-control"
                    name="gender"
                    required>
              <option value="">Select</option>
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
            </select>
          </div>

        </div>
      </div>

      <!-- Submit -->
      <button type="submit"
              class="btn btn-primary mt-3">
        💳 Proceed to Payment
      </button>

    </form>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
