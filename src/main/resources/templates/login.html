<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — BM Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body class="auth-bg">

    <div class="container-narrow">
        <div class="card animate-scale-in">

            <!-- Logo -->
            <div class="brand-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
                    <rect width="48" height="48" rx="12" fill="url(#g1)"/>
                    <path d="M14 32V18a4 4 0 014-4h12a4 4 0 014 4v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                    <rect x="17" y="17" width="14" height="8" rx="2" stroke="#fff" stroke-width="2"/>
                    <circle cx="19" cy="32" r="2.5" fill="#fff"/>
                    <circle cx="29" cy="32" r="2.5" fill="#fff"/>
                    <path d="M14 28h20" stroke="#fff" stroke-width="2"/>
                    <defs><linearGradient id="g1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#1e3a5f"/><stop offset="1" stop-color="#4f46e5"/></linearGradient></defs>
                </svg>
                <span class="brand-logo-text">BM Booking</span>
            </div>

            <h2 class="card-title" style="justify-content:center; border:none; padding-bottom:0; margin-bottom:16px; font-size:1.3rem;">Welcome Back</h2>

            <!-- Error alert -->
            <div th:if="${param.error}" class="alert alert-error">
                ⚠️ Invalid email or password. Please try again.
            </div>

            <!-- Logout alert -->
            <div th:if="${param.logout}" class="alert alert-success">
                ✅ You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password"
                        required />
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <p class="text-center mt-2" style="color:#64748b;">
                Don't have an account?
                <a th:href="@{/auth/register}">Register here</a>
            </p>
        </div>
    </div>

</body>

</html>
