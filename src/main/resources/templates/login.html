<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — BM Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

    <div class="container-narrow">
        <div class="card">
            <h2 class="card-title text-center">Welcome Back</h2>

            <!-- Error alert -->
            <div th:if="${param.error}" class="alert alert-error">
                Invalid email or password. Please try again.
            </div>

            <!-- Logout alert -->
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out successfully.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password"
                        required />
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <p class="text-center mt-2">
                Don't have an account?
                <a th:href="@{/auth/register}">Register here</a>
            </p>
        </div>
    </div>

</body>

</html>
