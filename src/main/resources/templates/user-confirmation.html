<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmed — BM Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a class="navbar-brand" th:href="@{/user/dashboard}">🚌 BM Booking</a>
        <ul class="navbar-links">
            <li><a th:href="@{/user/search}">Search Routes</a></li>
            <li><a th:href="@{/user/my-bookings}">My Bookings</a></li>
            <li><a th:href="@{/logout}" class="btn-logout">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card confirmation-card">
            <div class="check-icon">🎉</div>
            <h2>Booking Confirmed!</h2>

            <div class="confirmation-details">
                <div class="detail-row">
                    <span class="detail-label">Route</span>
                    <span class="detail-value" th:text="${booking.schedule.route.sourceStop.city
                          + ' → '
                          + booking.schedule.route.destinationStop.city}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">From</span>
                    <span class="detail-value" th:text="${booking.schedule.route.sourceStop.stopName}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">To</span>
                    <span class="detail-value" th:text="${booking.schedule.route.destinationStop.stopName}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Travel Date</span>
                    <span class="detail-value" th:text="${booking.schedule.travelDate}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value">
                        <span class="badge" th:classappend="${booking.status.name() == 'CONFIRMED' ? 'badge-confirmed' :
                                           (booking.status.name() == 'PENDING' ? 'badge-pending' : 'badge-cancelled')}"
                            th:text="${booking.status}"></span>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total Fare</span>
                    <span class="detail-value"><strong>₹<span th:text="${booking.totalFare}"></span></strong></span>
                </div>
            </div>

            <div class="mt-3">
                <a th:href="@{/user/search}" class="btn btn-primary">Book Another Ticket</a>
                <a th:href="@{/user/my-bookings}" class="btn btn-outline" style="margin-left:8px;">My Bookings</a>
            </div>
        </div>
    </div>

</body>

</html>
