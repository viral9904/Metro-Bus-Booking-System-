<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password — BM Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

<nav class="navbar">
  <a class="navbar-brand" th:href="@{/user/dashboard}">
      <span class="brand-icon">🚌</span>
      BM Booking
  </a>
  <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
  </button>
  <ul class="navbar-links">
      <li><a th:href="@{/user/search}"><span class="nav-icon">🔍</span> Search</a></li>
      <li><a th:href="@{/user/my-bookings}"><span class="nav-icon">🎫</span> Bookings</a></li>
  </ul>
</nav>

<div class="container-narrow" style="min-height:auto; margin-top:40px;">

    <div class="card">
        <h2 class="card-title" style="justify-content:center; border:none;">🔐 Change Password</h2>

        <!-- ERROR -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- SUCCESS -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/change-password}" method="post">

            <div class="form-group">
                <label>Current Password</label>
                <input
                        type="password"
                        name="currentPassword"
                        class="form-control"
                        placeholder="Enter your current password"
                        required />
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input
                        type="password"
                        name="newPassword"
                        class="form-control"
                        placeholder="Enter new password"
                        required />
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input
                        type="password"
                        name="confirmPassword"
                        class="form-control"
                        placeholder="Re-enter new password"
                        required />
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                🔒 Update Password
            </button>

        </form>
    </div>

</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
