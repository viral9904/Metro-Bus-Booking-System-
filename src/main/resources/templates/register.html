<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — BM Booking</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

  <div class="container-narrow">
    <div class="card">
      <h2 class="card-title text-center">Create Account</h2>

      <form th:action="@{/auth/register}" th:object="${user}" method="post">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" th:field="*{email}" class="form-control" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 characters" required />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" th:field="*{phone}" class="form-control" placeholder="Enter your phone number" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>

      <p class="text-center mt-2">
        Already have an account?
        <a th:href="@{/auth/login}">Login here</a>
      </p>
    </div>
  </div>

</body>

</html>
