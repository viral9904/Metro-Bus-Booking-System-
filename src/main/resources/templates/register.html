<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — BM Booking</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body class="auth-bg">

  <div class="container-narrow">
    <div class="card animate-scale-in">

      <!-- Logo -->
      <div class="brand-logo">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
              <rect width="48" height="48" rx="12" fill="url(#g1)"/>
              <path d="M14 32V18a4 4 0 014-4h12a4 4 0 014 4v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
              <rect x="17" y="17" width="14" height="8" rx="2" stroke="#fff" stroke-width="2"/>
              <circle cx="19" cy="32" r="2.5" fill="#fff"/>
              <circle cx="29" cy="32" r="2.5" fill="#fff"/>
              <path d="M14 28h20" stroke="#fff" stroke-width="2"/>
              <defs><linearGradient id="g1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#1e3a5f"/><stop offset="1" stop-color="#4f46e5"/></linearGradient></defs>
          </svg>
          <span class="brand-logo-text">BM Booking</span>
      </div>

      <h2 class="card-title" style="justify-content:center; border:none; padding-bottom:0; margin-bottom:16px; font-size:1.3rem;">Create Account</h2>

      <form th:action="@{/auth/register}" th:object="${user}" method="post">
        <div class="form-group">
          <label>👤 Full Name</label>
          <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label>📧 Email</label>
          <input type="email" th:field="*{email}" class="form-control" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label>🔒 Password</label>

        <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required/>

        <p th:if="${#fields.hasErrors('password')}"
           th:errors="*{password}"
           style="color:red; font-size:.85rem; margin-top:4px;"></p>
        </div>
        <div class="form-group">
          <label>📱 Phone</label>
          <input type="text" th:field="*{phone}" class="form-control" placeholder="Enter your phone number" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>

      <p class="text-center mt-2" style="color:#64748b;">
        Already have an account?
        <a th:href="@{/auth/login}">Login here</a>
      </p>
    </div>
  </div>

</body>

</html>
