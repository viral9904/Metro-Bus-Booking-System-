<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment — BM Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <!-- Razorpay Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/user/dashboard}">
        <span class="brand-icon">🚌</span>
        BM Booking
    </a>
    <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <ul class="navbar-links">
        <li><a th:href="@{/user/search}"><span class="nav-icon">🔍</span> Search Routes</a></li>
        <li><a th:href="@{/user/my-bookings}"><span class="nav-icon">🎫</span> My Bookings</a></li>
        <!-- 👤 PROFILE DROPDOWN -->
        <li class="profile-dropdown" th:if="${loggedInUserName != null}">

            <a th:href="@{/profile}" class="profile-btn" id="profileBtn">
                <div class="avatar">👤</div>
                <span>Hi, <b th:text="${loggedInUserName}"></b></span>
            </a>

            <div id="dropdownMenu" class="dropdown-menu">
                <a th:href="@{/profile}">✏️ Edit Profile</a>
                <a th:href="@{/logout}">🚪 Logout</a>
            </div>

        </li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h2 class="card-title">💳 Payment</h2>

        <div class="route-info">
            <span>Total Fare:</span>
            <strong style="font-size:1.3rem; color:#1e3a5f;">₹<span th:text="${booking.totalFare}"></span></strong>
        </div>

        <input type="hidden" id="bookingId" th:value="${booking.id}" />

        <!-- Payment Method -->
        <div class="form-group">
            <label>Select Payment Method</label>
            <select id="method" class="form-control" required>
                <option value="">-- Select --</option>
                <option th:each="m : ${methods}" th:value="${m}" th:text="${m}"></option>
            </select>
        </div>

        <button type="button" class="btn btn-success btn-block" onclick="handlePayment()">
            💳 Pay Now
        </button>

    </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
    function handlePayment() {

        let bookingId = document.getElementById("bookingId").value;
        let method = document.getElementById("method").value;

        if (!method) {
            alert("Please select payment method");
            return;
        }

        // 💵 CASH → GET call
        if (method === "CASH") {
            window.location.href = `/user/payment?bookingId=${bookingId}&method=CASH`;
            return;
        }

        // 💳 ONLINE → Razorpay
        fetch(`/user/create-order/${bookingId}`)
            .then(res => res.json())
            .then(order => {

                var options = {
                    "key": "rzp_test_SSz37yPlLGcpdP",
                    "amount": order.amount,
                    "currency": "INR",
                    "name": "BM Booking",
                    "description": "Ticket Payment",
                    "order_id": order.id,

                    // ✅ UPDATED HANDLER (IMPORTANT 🔥)
                    "handler": function (response) {

                        fetch("/user/payment-success", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                bookingId: bookingId,
                                paymentId: response.razorpay_payment_id
                            })
                        })
                            .then(() => {
                                window.location.href = "/user/confirmation/" + bookingId;
                            })
                            .catch(err => {
                                alert("Payment saved failed!");
                                console.error(err);
                            });
                    },

                    "theme": {
                        "color": "#1e3a5f"
                    }
                };

                var rzp = new Razorpay(options);
                rzp.open();
            })
            .catch(err => {
                alert("Payment failed!");
                console.error(err);
            });
    }
</script>
</body>
</html>
