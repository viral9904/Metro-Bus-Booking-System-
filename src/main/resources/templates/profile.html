<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — BM Booking</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/user/dashboard}">
      <span class="brand-icon">🚌</span>
      BM Booking
  </a>
  <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
  </button>
  <ul class="navbar-links">
      <li><a th:href="@{/user/search}"><span class="nav-icon">🔍</span> Search</a></li>
      <li><a th:href="@{/user/my-bookings}"><span class="nav-icon">🎫</span> Bookings</a></li>
  </ul>
</nav>

<div class="container-narrow" style="min-height:auto; margin-top:40px;">

  <div class="card">

    <h2 class="card-title" style="justify-content:center; border:none;">👤 My Profile</h2>
    <div class="text-center mb-3">
      <div class="avatar" style="margin:auto; width:68px; height:68px; font-size:28px; background:linear-gradient(135deg,#e0e7ff,#c7d2fe);">
        👤
      </div>
      <p class="mt-2 text-muted" th:text="${user.fullName}"></p>
    </div>
    <form th:action="@{/profile/update}" method="post" th:object="${user}">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="form-control" th:field="*{fullName}" required />
      </div>

      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" class="form-control" th:field="*{email}" readonly />
      </div>

      <div class="form-group">
        <label>📱 Phone</label>
        <input type="text" class="form-control" th:field="*{phone}" />
      </div>

      <button type="submit" class="btn btn-primary btn-block mt-2">
        Update Profile
      </button>

    </form>

  </div>

</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
