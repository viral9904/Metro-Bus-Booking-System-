<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Stops — BM Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>

<!-- Navigation -->
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/admin/dashboard}">
        <span class="brand-icon">🛠</span>
        BM Admin
    </a>
    <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <ul class="navbar-links">
        <li><a th:href="@{/admin/stops}" class="active"><span class="nav-icon">📍</span> Stops</a></li>
        <li><a th:href="@{/admin/routes}"><span class="nav-icon">🗺️</span> Routes</a></li>
        <li><a th:href="@{/admin/vehicles}"><span class="nav-icon">🚌</span> Vehicles</a></li>
        <li><a th:href="@{/admin/schedules}"><span class="nav-icon">📅</span> Schedules</a></li>
        <li><a th:href="@{/admin/seat-classes}"><span class="nav-icon">💺</span> Seat Classes</a></li>
        <!-- 👤 PROFILE DROPDOWN -->
        <li class="profile-dropdown" th:if="${loggedInUserName != null}">

            <a th:href="@{/profile}" class="profile-btn" id="profileBtn">
                <div class="avatar">👤</div>
                <span>Hi, <b th:text="${loggedInUserName}"></b></span>
            </a>

            <div id="dropdownMenu" class="dropdown-menu">
                <a th:href="@{/profile}">✏️ Edit Profile</a>
                <a th:href="@{/logout}">🚪 Logout</a>
            </div>

        </li>
    </ul>
</nav>

<div class="container">
    <div class="card">
        <h2 class="card-title">📍 Add New Stop</h2>

        <!-- 🔴 ERROR MESSAGE -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/admin/stops/save}" th:object="${stop}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" th:field="*{city}" class="form-control" placeholder="Enter city name"
                           required />
                </div>
                <div class="form-group">
                    <label>Stop Name</label>
                    <input type="text" th:field="*{stopName}" class="form-control" placeholder="Enter stop name"
                           required />
                </div>
            </div>
            <button type="submit" class="btn btn-primary">➕ Add Stop</button>
        </form>
    </div>

    <div class="card">
        <h2 class="card-title">📋 All Stops</h2>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>City</th>
                    <th>Stop Name</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${stops}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.city}"></td>
                    <td th:text="${s.stopName}"></td>
                    <td>
                        <a th:href="@{/admin/stops/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this stop?')">🗑 Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
